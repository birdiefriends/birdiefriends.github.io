<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Game — BirdieFriends 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1D9E75;--green-light:#E1F5EE;--green-dark:#085041;
  --gold:#BA7517;--gold-light:#FAEEDA;
  --combo:#534AB7;--combo-light:#EEEDFE;
  --text:#1a1a1a;--text-muted:#6b6b6b;--border:rgba(0,0,0,0.12);
  --surface:#f7f6f2;--card:#ffffff;--radius:12px;
}
body{font-family:'Instrument Sans',sans-serif;background:var(--surface);color:var(--text);min-height:100vh;padding:0 0 60px}
header{background:var(--green-dark);color:#fff;padding:16px 20px 0;text-align:center}
.header-title h1{font-family:'DM Serif Display',serif;font-size:1.4rem;margin-bottom:1px}
.header-title p{font-size:0.78rem;opacity:0.65;letter-spacing:0.04em;margin-bottom:12px}
.container{max-width:680px;margin:0 auto;padding:20px 16px}
.picker-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.07);margin-bottom:20px;text-align:center}
.picker-card label{display:block;font-size:0.78rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
select{width:100%;max-width:320px;padding:10px 14px;font-size:1rem;font-family:inherit;border:1.5px solid var(--border);border-radius:8px;background:#fff;color:var(--text);cursor:pointer}
select:focus{outline:none;border-color:var(--green)}
/* Narrative summary card */
.summary-card{background:var(--card);border-radius:var(--radius);box-shadow:0 2px 8px rgba(0,0,0,0.07);padding:20px 22px;margin-bottom:16px;border-left:4px solid var(--green)}
.summary-card p{font-size:0.97rem;line-height:1.65;color:var(--text)}
.summary-card p+p{margin-top:8px}
/* Collapsible sections */
.section{background:var(--card);border-radius:var(--radius);box-shadow:0 2px 8px rgba(0,0,0,0.07);margin-bottom:14px;overflow:hidden}
.section-toggle{width:100%;background:var(--green-dark);color:#fff;border:none;padding:14px 18px;font-family:'DM Serif Display',serif;font-size:1.05rem;text-align:left;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.section-toggle:hover{background:#0a6352}
.toggle-arrow{font-size:0.85rem;opacity:0.7;transition:transform 0.2s;font-family:'Instrument Sans',sans-serif}
.section-body{padding:16px 18px;display:none}
.section-body.open{display:block}
/* Event rows — compact */
.event-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:8px;background:#f8faf9;border:1px solid var(--border);cursor:pointer;transition:background 0.15s}
.event-row:hover{background:#eef7f3}
.event-row-main{flex:1;min-width:0}
.event-row-name{font-weight:600;font-size:0.9rem;color:var(--green-dark)}
.event-row-sub{font-size:0.78rem;color:var(--text-muted);margin-top:1px}
.event-row-score{text-align:right;font-family:'DM Mono',monospace;font-size:0.9rem;font-weight:600;white-space:nowrap}
.event-row-arrow{color:var(--text-muted);font-size:0.75rem;margin-left:4px}
.event-detail{display:none;background:#f0f7f4;border-radius:0 0 8px 8px;padding:12px 14px;margin-top:-8px;margin-bottom:8px;border:1px solid var(--border);border-top:none;font-size:0.85rem}
.event-detail.open{display:block}
/* Math blocks inside detail */
.math-block{background:#fff;border-left:3px solid var(--green);border-radius:0 6px 6px 0;padding:9px 12px;margin:8px 0;font-family:'DM Mono',monospace;font-size:0.8rem;line-height:1.7}
.math-block .mlabel{color:var(--text-muted);font-size:0.72rem;font-family:'Instrument Sans',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:3px}
.math-result{font-weight:700;color:var(--green-dark)}
.baseline-pill{display:inline-block;background:#fff8e1;color:#7a5a00;border:1px solid #f0d080;border-radius:6px;padding:3px 9px;font-size:0.75rem;font-weight:600;margin-bottom:6px}
/* Series score breakdown */
.series-rows{margin:10px 0}
.series-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:0.86rem}
.series-row:last-child{border-bottom:none}
.series-row-name{flex:1;color:var(--text)}
.series-row-val{font-family:'DM Mono',monospace;font-weight:600;min-width:52px;text-align:right}
.tag-best4{font-size:0.67rem;padding:1px 7px;border-radius:8px;background:#e8f5e9;color:#1a6b30;font-weight:600}
.tag-avg{font-size:0.67rem;padding:1px 7px;border-radius:8px;background:#f0f0f0;color:#888;font-weight:600}
.tag-retro{font-size:0.67rem;padding:1px 7px;border-radius:8px;background:#fff8e1;color:#7a5a00;font-weight:600}
.series-total-row{display:flex;align-items:center;gap:8px;padding:10px 0 4px;font-size:0.92rem;font-weight:700;color:var(--green-dark);border-top:2px solid var(--green);margin-top:4px}
.series-total-val{font-family:'DM Mono',monospace;min-width:52px;text-align:right}
/* Rank banner */
.rank-banner{background:linear-gradient(135deg,#085041,#1D9E75);color:#fff;border-radius:10px;padding:16px 20px;margin-bottom:14px;display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.rank-block{text-align:center;flex:1}
.rank-num{font-family:'DM Serif Display',serif;font-size:2rem;line-height:1}
.rank-label{font-size:0.68rem;opacity:0.7;letter-spacing:0.06em;text-transform:uppercase;margin-top:2px}
.rank-divider{width:1px;background:rgba(255,255,255,0.25);align-self:stretch;min-height:40px}
/* Tooltip */
.tip{display:inline-block;width:14px;height:14px;border-radius:50%;background:rgba(0,0,0,0.12);color:var(--text-muted);font-size:0.65rem;font-weight:700;text-align:center;line-height:14px;cursor:help;margin-left:3px;vertical-align:middle;position:relative}
.tip:hover::after{content:attr(data-tip);position:absolute;left:50%;transform:translateX(-50%);bottom:calc(100% + 6px);background:#1a1a1a;color:#fff;font-size:0.75rem;font-weight:400;padding:6px 10px;border-radius:6px;white-space:normal;width:220px;z-index:99;line-height:1.4;font-family:'Instrument Sans',sans-serif}
/* Qualifying banner */
.qual-banner{border-radius:8px;padding:11px 14px;margin-bottom:12px;font-size:0.86rem;font-weight:500}
.qual-yes{background:#e8f5e9;color:#1a6b30;border:1px solid #b2dfcc}
.qual-no{background:#fff8e1;color:#7a5a00;border:1px solid #f0d080}
.note{font-size:0.76rem;color:var(--text-muted);font-style:italic;margin-top:10px;line-height:1.5}
.hidden{display:none}
.tee-badge{display:inline-block;font-size:0.7rem;padding:1px 8px;border-radius:10px;font-weight:600;margin-left:5px;vertical-align:middle}
.tee-Green{background:#e8f5e9;color:#1a6b30}
.tee-Combo{background:#eeedfe;color:#534AB7}
.tee-Gold{background:#FAEEDA;color:#7a4a00}
</style>
</head>

function sign(v) { return v >= 0 ? '+' : ''; }
function fmt2(v) { return v === null || v === undefined ? '—' : (sign(v) + v.toFixed(2)); }
function teeClass(t) { return 'tee-badge tee-' + t; }

function toggleSection(id) {
  const body = document.getElementById(id);
  const arrow = document.getElementById(id + '-arrow');
  const open = body.classList.toggle('open');
  if (arrow) arrow.style.transform = open ? 'rotate(180deg)' : '';
}

function toggleEventDetail(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function showPlayer(name) {
  const wrap = document.getElementById('player-content');
  if (!name) { wrap.innerHTML = ''; wrap.classList.add('hidden'); return; }
  const p = ALL_PLAYER_DATA[name];
  if (!p) { wrap.innerHTML = ''; wrap.classList.add('hidden'); return; }
  wrap.classList.remove('hidden');

  // ── NARRATIVE SUMMARY ──────────────────────────────────────────────────
  const evtWord = n => n === 1 ? '1 event' : n + ' events';
  let narrative = '';

  if (p.scorablePlayed === 0) {
    // Only baseline event played
    narrative = `<p>${p.name} has played 1 event (baseline only). No series score has been calculated yet. A starting quota will be assigned for the next event based on the baseline score.</p>`;
  } else {
    const scoreStr = fmt2(p.seriesScore);
    const rankStr  = p.qualifies
      ? `ranked <strong>#${p.overallRank} overall</strong> and <strong>#${p.flightRank} in the ${p.seriesFlight || p.tee} flight</strong>`
      : `not yet qualified for the series championship (minimum 4 events required)`;
    const eventsStr = p.scorablePlayed === 1
      ? `1 event`
      : `${p.scorablePlayed} events`;
    const scoreDir = p.seriesScore > 0
      ? `above quota by ${Math.abs(p.seriesScore).toFixed(2)} points on average`
      : p.seriesScore < 0
      ? `below quota by ${Math.abs(p.seriesScore).toFixed(2)} points on average`
      : `exactly at quota`;

    narrative = `<p>${p.name} has played ${eventsStr} in the ${p.seriesFlight || p.tee} flight and is ${rankStr}.</p>

    if (!p.qualifies) {
      const needed = 4 - p.scorablePlayed;
      narrative += `<p>${needed} more qualifying event${needed !== 1 ? 's' : ''} needed to be eligible for the series championship payout.</p>`;
    }
    if (p.hasRetroE1) {
      narrative += `<p style="font-size:0.85rem;color:var(--text-muted);margin-top:6px">~ Event 1 baseline score has been retroactively included in the series calculation as an estimated result.</p>`;

            : 'HCP adjustment: none'}<br>
          ─────────────────────────────<br>
          New quota: <span class="math-result">${evt.quota.toFixed(2)}</span>
        </div>
        <div style="font-size:0.83rem;color:var(--text-muted);margin-top:4px">
          ${evt.tee} tees: ${evt.hcp < 10 ? 'HCP '+evt.hcp.toFixed(1)+' under 10.0' : evt.hcp < 18 ? 'HCP '+evt.hcp.toFixed(1)+' is 10.0–17.9' : 'HCP '+evt.hcp.toFixed(1)+' is 18.0 or above'}.
        </div>`;
      }

      quotaRows += `
      <div class="event-row" onclick="toggleEventDetail('${detailId}')">
        <div class="event-row-main">
          <div class="event-row-name">Event ${evtNum}: ${evt.eventName}
            <span class="${teeClass(evt.tee)}">${evt.tee}</span>
          </div>
          <div class="event-row-sub">Quota ${evt.quota.toFixed(2)} · Score ${evt.actual} pts</div>
        </div>
        <div class="event-row-score" style="color:${achColor}">${achStr}</div>
        <span class="event-row-arrow">▼</span>
      </div>
      <div class="event-detail" id="${detailId}">
        ${detailHtml}
      </div>`;
    }
  });

  // ── SERIES SECTION ─────────────────────────────────────────────────────
  const calcEvts  = p.calcEvts || [];
  const best4Set  = new Set(p.best4Events || []);
  const sortedCalc = [...calcEvts].sort((a,b) => b.result - a.result);

  let seriesRows = '';
  let best4Sum = 0;
  let restResults = [];

  sortedCalc.forEach(evt => {
    const evtName  = evt.eventName || '~E1 (retroactive)';
    const result   = Math.round(evt.result*100)/100;
    const isBest4  = best4Set.has(evtName);
    const isRetro  = evt.retroactive;
    const resStr   = fmt2(result);
    const resColor = result > 0 ? '#1a6b30' : result < 0 ? '#a32d2d' : '#555';
    const tag = isBest4
      ? `<span class="tag-best4">Top 4 ✓</span>`
      : `<span class="tag-avg">Averaged</span>`;
    const retroTag = isRetro ? ` <span class="tag-retro">~</span>` : '';
    if (isBest4) best4Sum += result;
    else restResults.push(result);

    seriesRows += `
    <div class="series-row">
      <div class="series-row-name">${isRetro ? 'Event 1 (estimated)' : evtName} ${tag}${retroTag}</div>
      <div class="series-row-val" style="color:${resColor}">${resStr}</div>
    </div>`;
  });

  let seriesCalcHtml = '';
  const best4Rounded = Math.round(best4Sum*100)/100;

  if (restResults.length > 0) {
    const restAvg = Math.round((restResults.reduce((s,v)=>s+v,0)/restResults.length)*100)/100;
    const total   = Math.round((best4Rounded + restAvg)*100)/100;
    seriesCalcHtml = `
    <div class="math-block" style="margin-top:12px">
      <span class="mlabel">How the series score is calculated</span>
      Top 4 events added together:&nbsp;&nbsp;&nbsp;${fmt2(best4Rounded)}<br>
      Remaining ${restResults.length} event${restResults.length>1?'s':''} averaged:&nbsp;${fmt2(restAvg)}<br>
      ──────────────────────────<br>
      Series score:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="math-result">${fmt2(total)}</span>
    </div>`;
  } else if (calcEvts.length >= 4) {
    seriesCalcHtml = `
    <div class="math-block" style="margin-top:12px">
      <span class="mlabel">How the series score is calculated</span>
      Top 4 events added (no remainder):<br>
      Series score: <span class="math-result">${fmt2(best4Rounded)}</span>
    </div>`;
  }

  const qualBanner = p.qualifies
    ? `<div class="qual-banner qual-yes">✅ Qualified for the series championship — ${p.scorablePlayed} events played.</div>`
    : `<div class="qual-banner qual-no">⏳ ${p.scorablePlayed} of 4 qualifying events completed. ${Math.max(0,4-p.scorablePlayed)} more needed.</div>`;

  // Rank banner (only if qualified)
  let rankHtml = '';
  if (p.qualifies) {
    const scoreStr = fmt2(p.seriesScore);
    rankHtml = `
    <div class="rank-banner">
      <div class="rank-block"><div class="rank-num">#${p.overallRank}</div><div class="rank-label">Overall</div></div>
      <div class="rank-divider"></div>
      <div class="rank-block"><div class="rank-num">#${p.flightRank}</div><div class="rank-label">${p.seriesFlight || p.tee} Flight</div></div>
      <div class="rank-divider"></div>
      <div class="rank-block"><div class="rank-num" style="font-size:1.5rem">${scoreStr}</div><div class="rank-label">Series Score</div></div>
    </div>`;
  }

  let retroNote = p.hasRetroE1
    ? `<div class="note">~ Event 1 (baseline) has been retroactively included as an estimated result using the average of your scored events (${fmt2(p.retroAvg)}). This recalculates as more events are played.</div>`
    : '';

  wrap.innerHTML = `
  <div class="summary-card">${narrative}</div>

  <div class="section">
    <button class="section-toggle" onclick="toggleSection('quota-body')">
      📋 My Quota — Event by Event
      <span class="toggle-arrow" id="quota-body-arrow">▼</span>
    </button>
    <div class="section-body" id="quota-body">
      <p style="font-size:0.82rem;color:var(--text-muted);margin-bottom:12px">Your quota is a target score based on your handicap. Tap any event to see how it was calculated.</p>
      ${quotaRows || '<p style="color:var(--text-muted);font-size:0.88rem">No events recorded yet.</p>'}
    </div>
  </div>

  <div class="section">
    <button class="section-toggle" onclick="toggleSection('series-body')">
      🏆 My Series Ranking
      <span class="toggle-arrow" id="series-body-arrow">▼</span>
    </button>
    <div class="section-body" id="series-body">
      ${rankHtml}
      ${qualBanner}
      <p style="font-size:0.82rem;color:var(--text-muted);margin-bottom:10px">Your top 4 results count in full. Any additional events are averaged together and added as one score. <span class="tip" data-tip="Achievement = your Stableford total minus your quota for that event. Positive means you beat your quota.">?</span></p>
      <div class="series-rows">${seriesRows || '<p style="color:var(--text-muted);font-size:0.88rem">No scored events yet.</p>'}</div>
      ${seriesCalcHtml}
      ${retroNote}
    </div>
  </div>`;
}
</script>
</body>
</html>
