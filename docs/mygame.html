<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Game — BirdieFriends 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1D9E75;--green-light:#E1F5EE;--green-dark:#085041;
  --gold:#BA7517;--gold-light:#FAEEDA;
  --combo:#534AB7;--combo-light:#EEEDFE;
  --text:#1a1a1a;--text-muted:#6b6b6b;--border:rgba(0,0,0,0.12);
  --surface:#f7f6f2;--card:#ffffff;--radius:12px;
}
body{font-family:'Instrument Sans',sans-serif;background:var(--surface);color:var(--text);min-height:100vh;padding:0 0 48px}
header{background:var(--green-dark);color:#fff;padding:18px 20px 14px;text-align:center}
header h1{font-family:'DM Serif Display',serif;font-size:1.6rem;margin-bottom:2px}
header p{font-size:0.82rem;opacity:0.7;letter-spacing:0.04em}
.container{max-width:680px;margin:0 auto;padding:20px 16px}
.picker-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.07);margin-bottom:20px;text-align:center}
.picker-card label{display:block;font-size:0.78rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
select{width:100%;max-width:320px;padding:10px 14px;font-size:1rem;font-family:inherit;border:1.5px solid var(--border);border-radius:8px;background:#fff;color:var(--text);cursor:pointer}
select:focus{outline:none;border-color:var(--green)}
.section{background:var(--card);border-radius:var(--radius);box-shadow:0 2px 8px rgba(0,0,0,0.07);margin-bottom:18px;overflow:hidden}
.section-header{background:var(--green-dark);color:#fff;padding:14px 18px;font-family:'DM Serif Display',serif;font-size:1.1rem}
.section-body{padding:16px 18px}
.event-card{border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:12px}
.event-card:last-child{margin-bottom:0}
.event-title{font-weight:600;font-size:0.95rem;margin-bottom:8px;color:var(--green-dark)}
.tee-badge{display:inline-block;font-size:0.72rem;padding:2px 9px;border-radius:10px;font-weight:600;margin-left:6px;vertical-align:middle}
.tee-Green{background:#e8f5e9;color:#1a6b30}
.tee-Combo{background:#eeedfe;color:#534AB7}
.tee-Gold{background:#FAEEDA;color:#7a4a00}
.math-block{background:#f8f9fa;border-left:3px solid var(--green);border-radius:0 6px 6px 0;padding:10px 14px;margin:10px 0;font-family:'DM Mono',monospace;font-size:0.82rem;line-height:1.7}
.math-block .label{color:var(--text-muted);font-size:0.75rem;font-family:'Instrument Sans',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:4px}
.math-result{font-weight:600;color:var(--green-dark);font-size:0.9rem}
.explain-text{font-size:0.88rem;color:var(--text-muted);line-height:1.6;margin:6px 0}
.series-table{width:100%;border-collapse:collapse;font-size:0.86rem;margin:12px 0}
.series-table th{text-align:left;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-muted);font-weight:600;padding:4px 8px;border-bottom:2px solid var(--border)}
.series-table td{padding:8px;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace}
.series-table td.label-col{font-family:'Instrument Sans',sans-serif;font-weight:500}
.tag-best4{display:inline-block;font-size:0.68rem;padding:1px 7px;border-radius:8px;background:#e8f5e9;color:#1a6b30;font-weight:600;font-family:'Instrument Sans',sans-serif}
.tag-avg{display:inline-block;font-size:0.68rem;padding:1px 7px;border-radius:8px;background:#f0f0f0;color:#888;font-weight:600;font-family:'Instrument Sans',sans-serif}
.tag-retro{display:inline-block;font-size:0.68rem;padding:1px 7px;border-radius:8px;background:#fff8e1;color:#7a5a00;font-weight:600;font-family:'Instrument Sans',sans-serif}
.sum-row td{font-weight:700;color:var(--green-dark);border-top:2px solid var(--green);border-bottom:none;padding-top:10px}
.perf-pos{color:#1a6b30;font-weight:700}
.perf-neg{color:#a32d2d;font-weight:600}
.rank-banner{background:linear-gradient(135deg,#085041,#1D9E75);color:#fff;border-radius:10px;padding:16px 20px;margin-bottom:16px;display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.rank-block{text-align:center;flex:1}
.rank-block .rank-num{font-family:'DM Serif Display',serif;font-size:2.2rem;line-height:1}
.rank-block .rank-label{font-size:0.72rem;opacity:0.75;letter-spacing:0.06em;text-transform:uppercase;margin-top:2px}
.rank-divider{width:1px;background:rgba(255,255,255,0.25);align-self:stretch}
.note{font-size:0.78rem;color:var(--text-muted);font-style:italic;margin-top:10px;line-height:1.5}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted)}
.hidden{display:none}
.baseline-card{background:#fff8e1;border:1px solid #f0d080;border-radius:8px;padding:12px 16px;margin-bottom:12px;font-size:0.88rem;color:#7a5a00}
.qualifying-banner{border-radius:8px;padding:12px 16px;margin-bottom:14px;font-size:0.88rem;font-weight:500}
.qualifying-yes{background:#e8f5e9;color:#1a6b30;border:1px solid #b2dfcc}
.qualifying-no{background:#fff8e1;color:#7a5a00;border:1px solid #f0d080}
</style>
</head>
