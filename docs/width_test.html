<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #eee; font-family: sans-serif; font-size: 14px; }

.test1 { background: red; width: 100%; height: 40px; }
.test2 { background: blue; margin: 4px 0; height: 40px; }
.test3 { background: green; padding: 0 4px; }
.test3-inner { background: orange; height: 40px; width: 100%; }
.test4 { background: purple; max-width: 680px; margin: 0 auto; }
.test4-inner { background: pink; height: 40px; width: 100%; }

.info { background: white; padding: 8px; margin: 4px 0; font-size: 12px; }
</style>
</head>
<body>
<div class="info" id="info">Loading...</div>
<div class="test1">RED: body width 100%</div>
<div class="test2">BLUE: no padding/margin</div>
<div class="test3">
  <div class="test3-inner">GREEN outer / ORANGE inner: padding 0 4px</div>
</div>
<div class="test4">
  <div class="test4-inner">PURPLE max-width:680px margin:auto / PINK inner 100%</div>
</div>
<script>
document.getElementById('info').textContent = 
  'viewport: ' + window.innerWidth + 'x' + window.innerHeight + 
  ' | devicePixelRatio: ' + window.devicePixelRatio +
  ' | screen: ' + screen.width + 'x' + screen.height;
</script>
</body>
</html>
